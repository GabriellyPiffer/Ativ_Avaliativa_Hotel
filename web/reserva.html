<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservas</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <nav>

            <div class="logo-menu">
                <img width="60" src="logo.png">

                <h2>Hotel Reservas</h2>
            </div>

            <ul>

                <li>
                    <a href="inicio.html">
                        <i class="fa-solid fa-bed"></i>
                        Quartos
                    </a>
                </li>

                <li>
                    <a href="reserva.html">
                        <i class="fa-solid fa-calendar"></i>
                        Reservas
                    </a>
                </li>

                <li>
                    <i class="fa-solid fa-circle-info"></i>
                    Sobre
                </li>

            </ul>

        </nav>

        <main>

            <div class="topo">

                <div>
                    <h1>Reservas Cadastradas</h1>
                    <p>Gerencie as reservas do hotel</p>
                </div>

                <button onclick="cadastro.classList.remove('oculto')">

                    <i class="fa-solid fa-plus"></i>
                    Nova Reserva

                </button>

            </div>

            <div class="tabela">

                <table>

                    <thead>

                        <tr>
                            <th>ID</th>
                            <th>Hóspede</th>
                            <th>Entrada</th>
                            <th>Saída</th>
                            <th>Quarto</th>
                            <th>Ações</th>
                        </tr>

                    </thead>

                    <tbody id="listaReservas">

                    </tbody>

                </table>

            </div>

        </main>

    </div>

    <div id="cadastro" class="modal oculto">

        <div class="janela">

            <h2>Cadastrar Reserva</h2>

            <form id="formCad">

                <label>Hóspede</label>
                <input type="text" id="hospede" required>

                <label>Data de Saída</label>
                <input type="date" id="saida">

                <label>Número do Quarto</label>
                <input type="number" id="numero" required>

                <br><br>

                <button type="button" onclick="cadastro.classList.add('oculto')">

                    Cancelar

                </button>

                <button type="submit">

                    Salvar

                </button>

            </form>

        </div>

    </div>

    <div id="modalConfirmar" class="modal oculto">

        <div class="janela-confirmar">

            <i class="fa-solid fa-circle-exclamation icone-alerta"></i>

            <h2 id="tituloConfirmacao">Confirmação</h2>

            <p id="textoConfirmacao">
                Tem certeza que deseja continuar?
            </p>

            <div class="botoes-modal">

                <button class="btn-cancelar" onclick="modalConfirmar.classList.add('oculto')">
                    Cancelar
                </button>

                <button class="btn-confirmar" onclick="confirmarExclusaoReserva()">
                    Confirmar
                </button>

            </div>

        </div>

    </div>

    <div id="modalMensagem" class="modal oculto">

        <div class="modal-conteudo">

            <div id="iconeMensagem" class="icone-sucesso">
                <i class="fa-solid fa-check"></i>
            </div>

            <h2 id="tituloMensagem">Sucesso</h2>

            <p id="textoMensagem"></p>

            <button onclick="fecharMensagem()">OK</button>

        </div>

    </div>

    <script src="script1.js"></script>

</body>

</html>
